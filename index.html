<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>瞌睡虫V5趋势分析软件</title>
    <style>
        * { box-sizing: border-box; }
        body { margin:0; padding:0; font-family:Arial; background:#0d1117; color:#c9d1d9; }
        .header { background:#161b22; padding:15px; text-align:center; border-bottom:1px solid #30363d; }
        .main { display:flex; height:calc(100vh - 58px); }
        .left { width:350px; background:#21262d; padding:12px; overflow-y:auto; }
        .right { flex:1; background:#161b22; padding:10px; overflow-y:auto; display:flex; flex-direction:column; }
        .box { background:#161b22; border-radius:8px; padding:10px; margin-bottom:12px; border:1px solid #30363d; }
        .title { font-weight:bold; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid #30363d; }
        textarea { width:100%; height:70px; padding:6px; background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#c9d1d9; font-size:11px; font-family:monospace; resize:vertical; }
        .btn { padding:7px 12px; border:none; border-radius:4px; font-size:12px; cursor:pointer; }
        .btn-blue { background:#58a6ff; color:#0d1117; font-weight:bold; }
        .btn-gray { background:#30363d; color:#c9d1d9; }
        .btn-green { background:#238636; color:#fff; }
        .btn-orange { background:#db6d28; color:#fff; }
        .btn-purple { background:#8957e5; color:#fff; }
        .btn-row { display:flex; gap:6px; margin-top:8px; }
        .btn-row .btn { flex:1; }
        .pos-btns { display:flex; gap:4px; margin-bottom:12px; }
        .pos-btn { flex:1; padding:8px; background:#30363d; border:none; border-radius:4px; color:#c9d1d9; cursor:pointer; }
        .pos-btn.active { background:#58a6ff; color:#0d1117; }
        .golden-btns { display:flex; flex-wrap:wrap; gap:4px; }
        .golden-btn { width:calc(25% - 4px); padding:8px 4px; background:#30363d; border:none; border-radius:4px; color:#c9d1d9; cursor:pointer; font-size:11px; }
        .golden-btn.active { background:#f0883e; }
        .groups-list { max-height:180px; overflow-y:auto; }
        .group-item { background:#0d1117; border-radius:4px; padding:6px; margin-bottom:6px; }
        .group-header { display:flex; justify-content:space-between; margin-bottom:4px; }
        .group-name { font-weight:bold; font-size:12px; }
        .group-info { font-size:10px; color:#58a6ff; }
        .group-nums { font-size:11px; color:#8b949e; font-family:monospace; max-height:40px; overflow-y:auto; white-space:pre-wrap; }
        .copy-btn { float:right; padding:2px 5px; background:#30363d; border:none; border-radius:3px; color:#c9d1d9; font-size:10px; cursor:pointer; }
        .charts-container { flex:1; overflow-y:auto; padding:5px; }
        .charts-grid { display:flex; flex-wrap:wrap; gap:10px; justify-content:flex-start; align-content:flex-start; }
        .chart-box { background:#21262d; border-radius:8px; padding:10px; border:1px solid #30363d; cursor:pointer; width:220px; transition:all 0.2s; }
        .chart-box:hover { border-color:#58a6ff; transform:scale(1.02); }
        .chart-title { font-size:12px; font-weight:bold; margin-bottom:5px; color:#fff; }
        .chart-hit { font-size:10px; color:#58a6ff; margin-bottom:5px; }
        .chart-canvas { width:200px; height:130px; background:#0d1117; border-radius:4px; display:block; }
        .status-bar { background:#161b22; padding:8px; text-align:center; font-size:11px; color:#8b949e; border-top:1px solid #30363d; }
        .badge { font-size:9px; padding:1px 4px; background:#f0883e; border-radius:8px; margin-left:4px; }

        /* 模态框样式 */
        .modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.9); z-index:1000; justify-content:center; align-items:center; }
        .modal.show { display:flex; }
        .modal-content { width:95%; max-width:1400px; height:85%; background:#0d1117; border-radius:8px; border:1px solid #21262d; display:flex; flex-direction:column; }
        .modal-header { padding:10px 15px; border-bottom:1px solid #21262d; display:flex; justify-content:space-between; align-items:center; background:#161b22; }
        .modal-title { font-size:14px; font-weight:bold; color:#c9d1d9; }
        .modal-close { padding:5px 14px; background:#f85149; border:none; border-radius:4px; color:#fff; cursor:pointer; font-size:12px; }
        .modal-body { flex:1; padding:10px; }
        .big-canvas { width:100%; height:100%; background:#0d1117; border-radius:6px; }
        .modal-info { padding:10px 15px; border-top:1px solid #21262d; display:flex; gap:25px; font-size:11px; background:#161b22; align-items:center; }
        .modal-actions { margin-left:auto; display:flex; gap:8px; }
        .modal-actions .btn { padding:6px 14px; font-size:11px; }
        .info-item { display:flex; gap:6px; }
        .info-label { color:#8b949e; }
        .info-value { color:#58a6ff; font-weight:bold; }
        
        /* K线编辑器样式 */
        .editor-box { background:#161b22; border-radius:8px; padding:10px; margin-bottom:12px; border:1px solid #30363d; }
        .editor-title { font-weight:bold; margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid #30363d; display:flex; justify-content:space-between; align-items:center; }
        .editor-canvas { width:100%; height:100px; background:#000; border-radius:4px; display:block; cursor:crosshair; }
        .editor-input { width:100%; height:50px; padding:6px; background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#c9d1d9; font-size:11px; font-family:monospace; resize:none; margin:8px 0; }
        .editor-hint { font-size:9px; color:#8b949e; margin-bottom:6px; }
        .trend-list { max-height:120px; overflow-y:auto; margin-top:8px; }
        .trend-item { background:#0d1117; border-radius:4px; padding:6px; margin-bottom:4px; display:flex; justify-content:space-between; align-items:center; }
        .trend-name { font-size:11px; color:#c9d1d9; cursor:pointer; }
        .trend-name:hover { color:#58a6ff; }
        .trend-name.selected { color:#58a6ff; font-weight:bold; }
        .trend-del { padding:2px 6px; background:#f85149; border:none; border-radius:3px; color:#fff; font-size:10px; cursor:pointer; }
        .trend-preview { width:60px; height:30px; background:#000; border-radius:2px; margin-right:8px; }
        .auto-section { margin-top:10px; padding-top:10px; border-top:1px solid #30363d; }
        .auto-title { font-weight:bold; margin-bottom:8px; color:#f0883e; }
        .split-config { margin-bottom:8px; }
        .config-row { display:flex; align-items:center; margin-bottom:6px; gap:8px; }
        .config-label { font-size:11px; color:#8b949e; width:80px; }
        .config-select { flex:1; padding:6px; background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#c9d1d9; font-size:11px; }
        .config-trend { flex:1; padding:6px; background:#0d1117; border:1px solid #30363d; border-radius:4px; color:#58a6ff; font-size:11px; }
        .result-final { background:#0d1117; border-radius:4px; padding:10px; margin-top:10px; border:1px solid #238636; }
        .result-title { color:#238636; font-weight:bold; margin-bottom:6px; }
        .result-nums { font-family:monospace; font-size:12px; color:#c9d1d9; word-break:break-all; }
        .sim-score { color:#58a6ff; font-size:10px; margin-top:4px; }
        
        /* 分割设置弹窗 */
        .split-modal { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.85); z-index:2000; justify-content:center; align-items:center; }
        .split-modal.show { display:flex; }
        .split-modal-content { width:90%; max-width:600px; background:#21262d; border-radius:8px; padding:20px; border:1px solid #30363d; }
        .split-modal-title { font-size:16px; font-weight:bold; margin-bottom:15px; color:#fff; }
        .split-row { display:flex; align-items:center; margin-bottom:12px; gap:10px; background:#161b22; padding:10px; border-radius:6px; }
        .split-num { font-weight:bold; color:#58a6ff; width:80px; }
        .split-selects { flex:1; display:flex; gap:8px; }
        .split-info { font-size:10px; color:#8b949e; }
    </style>
</head>
<body>
    <div class="header"><h2>瞌睡虫V5趋势分析软件</h2></div>
    <div class="main">
        <div class="left">
            <div class="box">
                <div class="title">开奖数据 <span class="badge" id="drawCount">0期</span> <button class="btn btn-red btn-small" onclick="clearDrawData()">清空数据</button></div>
                <div id="currentDrawDisplay" style="background:#0d1117;border:1px solid #30363d;border-radius:4px;padding:10px;margin-bottom:8px;text-align:center;">
                    <div style="font-size:10px;color:#8b949e;margin-bottom:4px;">最新开奖号码</div>
                    <div id="currentDrawNumber" style="font-size:24px;font-weight:bold;color:#58a6ff;font-family:monospace;">--</div>
                    <div id="currentDrawPeriod" style="font-size:10px;color:#8b949e;margin-top:4px;">等待数据...</div>
                </div>
                <textarea id="drawInput" readonly style="height:130px;"></textarea>
                <div style="margin-top:8px;">
                    <input type="text" id="manualInput" placeholder="输入格式: 20260620-0173 12345" style="width:100%;padding:6px;margin-bottom:6px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-size:12px;">
                    <div class="btn-row">
                        <button class="btn btn-blue" onclick="addManualData()">添加</button>
                        <button class="btn btn-green" onclick="importDrawDataFile()">导入文件</button>
                    </div>
                    <div class="btn-row" style="margin-top:6px;">
                        <button class="btn btn-orange" onclick="pasteWebData()">粘贴网页数据</button>
                    </div>
                </div>
            </div>

            <!-- 外部数据接入 -->
            <div class="box">
                <div class="title">外部数据接入</div>
                <input type="text" id="apiUrl" value="http://vip.lkag3.com/K26a35690c17177/p/10.json" style="width:100%;padding:6px;margin-bottom:8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;color:#c9d1d9;font-size:11px;">
                <div style="font-size:10px;color:#8b949e;margin-bottom:6px;">可用API: <span style="color:#58a6ff;">JSON格式</span> 或 <span style="color:#f0883e;">XML格式(.xml)</span></div>
                <div class="btn-row">
                    <button class="btn btn-blue" onclick="fetchExternalData()">获取数据</button>
                    <button class="btn btn-green" onclick="startAutoRefresh()">开启自动刷新</button>
                    <button class="btn btn-gray" onclick="stopAutoRefresh()">停止刷新</button>
                </div>
                <div class="btn-row" style="margin-top:8px;">
                    <button class="btn btn-orange" onclick="exportData()">导出数据</button>
                    <button class="btn btn-purple" onclick="importData()">导入数据</button>
                </div>
                <div id="apiStatus" style="font-size:10px;color:#8b949e;margin-top:8px;"></div>
                <div id="refreshStatus" style="font-size:10px;color:#8b949e;margin-top:4px;"></div>
                <div id="dataStatus" style="font-size:10px;color:#58a6ff;margin-top:4px;"></div>
            </div>

            <div class="box">
                <div class="title">定位选择</div>
                <div class="pos-btns">
                    <button class="pos-btn active" onclick="setPos('front')">前三</button>
                    <button class="pos-btn" onclick="setPos('middle')">中三</button>
                    <button class="pos-btn" onclick="setPos('back')">后三</button>
                </div>
            </div>

            <div class="box">
                <div class="title">黄金分割</div>
                <div class="golden-btns">
                    <button class="golden-btn" onclick="generateGroups(3)">3中2</button>
                    <button class="golden-btn" onclick="generateGroups(4)">4中3</button>
                    <button class="golden-btn" onclick="generateGroups(5)">5中4</button>
                    <button class="golden-btn" onclick="generateGroups(6)">6中5</button>
                    <button class="golden-btn" onclick="generateGroups(7)">7中6</button>
                    <button class="golden-btn" onclick="generateGroups(8)">8中7</button>
                    <button class="golden-btn" onclick="generateGroups(9)">9中8</button>
                    <button class="golden-btn" onclick="generateGroups(10)">10中9</button>
                </div>
            </div>

            <div class="box">
                <div class="title">指定大底</div>
                <textarea id="baseInput"></textarea>
                <div class="btn-row">
                    <button class="btn btn-gray" onclick="clearBase()">清空</button>
                    <button class="btn btn-green" onclick="pasteToBase()">粘贴</button>
                    <button class="btn btn-orange" onclick="showBaseTrend()">查看趋势图</button>
                    <button class="btn btn-blue" onclick="applyBase()">使用大底</button>
                </div>
            </div>

            <div class="box">
                <div class="title">生成结果</div>
                <div class="groups-list" id="groupsList">点击按钮生成分组</div>
            </div>

            <!-- K线编辑器 -->
            <div class="editor-box">
                <div class="editor-title">
                    <span>K线编辑器</span>
                    <span style="font-size:10px;color:#8b949e;">(0=中, 1=未中)</span>
                </div>
                <canvas id="editorCanvas" class="editor-canvas"></canvas>
                <div class="editor-hint">提示：输入010101010...或在上方画线，0表示命中，1表示未命中</div>
                <textarea id="editorInput" class="editor-input" placeholder="输入010101...格式数据，0=中，1=未中"></textarea>
                <div class="btn-row">
                    <button class="btn btn-gray" onclick="clearEditor()">清空</button>
                    <button class="btn btn-green" onclick="previewTrend()">预览</button>
                    <button class="btn btn-blue" onclick="saveTrend()">保存趋势图</button>
                </div>
                <div class="btn-row" style="margin-top:6px;">
                    <button class="btn btn-orange" onclick="exportTrendPatterns()">导出趋势图</button>
                    <button class="btn btn-purple" onclick="importTrendPatterns()">导入趋势图</button>
                </div>
                <div class="trend-list" id="trendList"></div>
            </div>

            <!-- 自动分割区域 -->
            <div class="editor-box">
                <div class="auto-title">自动分割匹配</div>
                <div class="btn-row">
                    <button class="btn btn-green" onclick="openSplitConfig()">开始智能分割</button>
                </div>
                <div id="autoResult"></div>
            </div>
        </div>

        <div class="right">
            <div class="charts-container">
                <div class="charts-grid" id="chartsGrid"></div>
            </div>
            <div class="status-bar" id="status">准备就绪</div>
        </div>
    </div>

    <!-- 模态框 -->
    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div class="modal-title" id="modalTitle">黄金分割1</div>
                <button class="modal-close" onclick="closeModal()">关闭</button>
            </div>
            <div class="modal-body">
                <canvas id="bigCanvas" class="big-canvas"></canvas>
            </div>
            <div class="modal-info">
                <div class="info-item"><span class="info-label">命中:</span><span class="info-value" id="mHit">0/0</span></div>
                <div class="info-item"><span class="info-label">总期数:</span><span class="info-value" id="mTotal">0</span></div>
                <div class="info-item"><span class="info-label">号码数:</span><span class="info-value" id="mCount">0</span></div>
                <div class="info-item"><span class="info-label">定位:</span><span class="info-value" id="mPos">前三</span></div>
                <div class="modal-actions">
                    <button class="btn btn-blue" onclick="copyGroupNumbers()">复制号码</button>
                    <button class="btn btn-green" onclick="saveTrendFromChart()">保存趋势图</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 分割设置弹窗 -->
    <div class="split-modal" id="splitModal">
        <div class="split-modal-content">
            <div class="split-modal-title">智能分割设置</div>
            <div class="split-row">
                <div class="split-num">分割次数</div>
                <select id="splitCount" class="config-select" onchange="updateSplitRows()">
                    <option value="1">1次</option>
                    <option value="2" selected>2次</option>
                    <option value="3">3次</option>
                    <option value="4">4次</option>
                </select>
            </div>
            <div id="splitConfigContainer">
                <!-- 动态生成 -->
            </div>
            <div class="btn-row" style="margin-top:20px;">
                <button class="btn btn-gray" onclick="closeSplitModal()">取消</button>
                <button class="btn btn-green" onclick="startAutoSplit()">开始分割</button>
            </div>
        </div>
    </div>

    <script>
        var drawData = [];
        var groups = [];
        var posType = 'front';
        var currentChartIdx = 0;
        var currentN = 0; // 当前黄金分割数量

        function updateCurrentDrawDisplay() {
            if (drawData.length > 0) {
                var latest = drawData[0]; // 最新一期
                var number = latest.num || latest.number || latest.numbers || '';
                
                // 格式化号码显示（每个数字之间加空格）
                var formattedNumber = number.toString().split('').join(' ');
                
                document.getElementById('currentDrawNumber').textContent = formattedNumber;
                document.getElementById('currentDrawPeriod').textContent = '';
            } else {
                document.getElementById('currentDrawNumber').textContent = '--';
                document.getElementById('currentDrawPeriod').textContent = '';
            }
        }

        function fmtNum(n) { return String(n).padStart(3, '0'); }
        function rand(s) { var x = Math.sin(s) * 10000; return x - Math.floor(x); }

        function shuffle(arr, seed) {
            seed = seed || Date.now();
            var result = arr.slice();
            for (var i = result.length - 1; i > 0; i--) {
                var j = Math.floor(rand(seed + i) * (i + 1));
                var t = result[i]; result[i] = result[j]; result[j] = t;
            }
            return result;
        }

        function createGroups(n, nums) {
            var total = nums ? nums.slice() : [];
            if (total.length === 0) {
                for (var i = 0; i < 1000; i++) total.push(i);
            }
            var shuffled = shuffle(total, Date.now() + Math.random() * 10000);
            var result = [];
            for (var i = 0; i < n; i++) result.push([]);
            for (var idx = 0; idx < shuffled.length; idx++) {
                var exclude = idx % n;
                for (var g = 0; g < n; g++) {
                    if (g !== exclude) result[g].push(shuffled[idx]);
                }
            }
            console.log('createGroups done, n=' + n + ', groups.length=' + result.length);
            return result;
        }

        function updateCharts(n) {
            console.log('========================================');
            console.log('updateCharts called, n=' + n + ', groups.length=' + groups.length);
            
            var grid = document.getElementById('chartsGrid');
            console.log('chartsGrid element:', grid);
            grid.innerHTML = '';
            console.log('chartsGrid cleared');
            
            var actualLen = Math.min(n, groups.length);
            console.log('Actual charts to create: ' + actualLen);
            
            for (var i = 0; i < actualLen; i++) {
                console.log('------------------------');
                console.log('Loop iteration ' + i);
                console.log('groups[' + i + '] exists:', groups[i] ? 'yes' : 'no');
                console.log('groups[' + i + '] length:', groups[i] ? groups[i].length : 'undefined');
                
                if (groups[i] && groups[i].length > 0) {
                    var box = document.createElement('div');
                    box.className = 'chart-box';
                    box.onclick = (function(idx) { return function() { openModal(idx); }; })(i);
                    
                    var title = document.createElement('div');
                    title.className = 'chart-title';
                    title.textContent = '黄金分割' + (i + 1);
                    
                    var hit = document.createElement('div');
                    hit.className = 'chart-hit';
                    var h = calcHit(groups[i], drawData);
                    hit.textContent = '命中: ' + h.hits + '/' + h.total;
                    
                    var canvas = document.createElement('canvas');
                    canvas.className = 'chart-canvas';
                    canvas.width = 200;
                    canvas.height = 130;
                    
                    box.appendChild(title);
                    box.appendChild(hit);
                    box.appendChild(canvas);
                    grid.appendChild(box);
                    
                    drawChart(canvas, groups[i], i, false);
                    console.log('Created chart ' + (i + 1));
                    console.log('Box appended to grid:', grid.children.length + ' children');
                }
            }
            console.log('========================================');
            console.log('updateCharts finished, grid has ' + grid.children.length + ' children');
        }

        function parseDraws(input) {
            var lines = input.split('\n');
            var result = [];
            for (var i = 0; i < lines.length; i++) {
                var p = lines[i].trim().split(/\s+/);
                if (p.length >= 2) {
                    var num = p[1].padStart(5, '0');
                    if (num.length === 5) result.push({ issue: p[0], num: num });
                }
            }
            return result;
        }

        function parseBase(input) {
            // 替换各种分隔符为空格，然后分割成数组
            var parts = input.replace(/[，,，\n\r\t]/g, ' ').split(/\s+/);
            var result = [];
            var seen = {};
            for (var i = 0; i < parts.length; i++) {
                var part = parts[i].trim();
                if (!part) continue;
                
                // 尝试解析为数字
                var n = parseInt(part, 10);
                if (!isNaN(n) && n >= 0 && n <= 999 && !seen[n]) {
                    seen[n] = true;
                    result.push(n);
                }
            }
            return result;
        }

        function getPosNum(num) {
            if (!num) return -1;
            if (posType === 'front') return parseInt(num.substring(0, 3), 10);
            if (posType === 'middle') return parseInt(num.substring(1, 4), 10);
            return parseInt(num.substring(2, 5), 10);
        }

        function calcHit(group, draws) {
            var set = {};
            for (var i = 0; i < group.length; i++) set[group[i]] = true;
            var hits = 0;
            for (var i = 0; i < draws.length; i++) {
                if (set[getPosNum(draws[i].num)]) hits++;
            }
            return { hits: hits, total: draws.length };
        }

        function drawChart(canvas, group, chartIdx, isBig) {
            var ctx = canvas.getContext('2d');
            var w = canvas.width;
            var h = canvas.height;
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, w, h);

            var totalCnt = drawData.length;
            var cnt = Math.min(totalCnt, isBig ? 150 : 30);
            if (cnt === 0) {
                ctx.fillStyle = '#666666';
                ctx.font = (isBig ? '24px' : '12px') + ' sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('暂无数据', w/2, h/2);
                return;
            }

            var startIdx = isBig ? 0 : (totalCnt - cnt);
            var cw = (w - 70) / cnt * (isBig ? 0.45 : 0.4);
            var gap = (w - 70) / cnt - cw;
            var pad = { top: (isBig ? 35 : 20), right: (isBig ? 50 : 40), bottom: (isBig ? 40 : 25), left: (isBig ? 50 : 40) };
            var ch = h - pad.top - pad.bottom;

            var set = {};
            for (var i = 0; i < group.length; i++) set[group[i]] = true;
            var hitResults = [];
            for (var i = 0; i < cnt; i++) {
                var dataItem = drawData[startIdx + i];
                if (dataItem && dataItem.num) {
                    hitResults.push(set[getPosNum(dataItem.num)] ? 1 : 0);
                } else {
                    hitResults.push(0);
                }
            }

            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            var gridLines = 21;
            for (var i = 0; i <= gridLines; i++) {
                var y = pad.top + ch * i / gridLines;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
            }

            var windowSize = 5;
            var scores = [];
            for (var i = 0; i < cnt; i++) {
                var start = Math.max(0, i - windowSize + 1);
                var hitCount = 0;
                var total = i - start + 1;
                for (var j = start; j <= i; j++) {
                    hitCount += hitResults[j];
                }
                var score = (hitCount / total) * 200 - 100;
                scores.push(score);
            }

            var smoothedScores = [];
            var smoothWindow = 3;
            for (var i = 0; i < cnt; i++) {
                var start = Math.max(0, i - smoothWindow + 1);
                var end = Math.min(cnt - 1, i + smoothWindow - 1);
                var sum = 0;
                for (var j = start; j <= end; j++) {
                    sum += scores[j];
                }
                smoothedScores.push(sum / (end - start + 1));
            }

            var values = [];
            for (var i = 0; i < cnt; i++) {
                var baseScore = smoothedScores[i] * 4;
                baseScore = Math.min(450, Math.max(-450, baseScore));
                
                var r1 = rand(chartIdx * 10000 + i * 100);
                var r2 = rand(chartIdx * 10000 + i * 100 + 1);
                
                var noise = (r1 - 0.5) * 30;
                var close = baseScore + noise;
                close = Math.min(470, Math.max(-470, close));
                
                var range = 10 + r2 * 20;
                var high = close + range * rand(chartIdx * 10000 + i * 100 + 2);
                var low = close - range * rand(chartIdx * 10000 + i * 100 + 3);
                high = Math.min(480, Math.max(close, high));
                low = Math.max(-480, Math.min(close, low));
                
                var open = i === 0 ? close : values[i-1].c;
                values.push({ o: open, c: close, h: high, l: low });
            }

            var sy = function(val) { return pad.top + ch * (500 - val) / 1000; };
            var sx = function(i) { return pad.left + i * (cw + gap); };

            var upperPts = [], lowerPts = [], midPts = [];
            for (var i = 0; i < cnt; i++) {
                var v = values[i];
                var avg = (v.h + v.l) / 2;
                midPts.push({ x: sx(i) + cw / 2, y: sy(avg) });
                upperPts.push({ x: sx(i) + cw / 2, y: sy(Math.min(480, avg + 60)) });
                lowerPts.push({ x: sx(i) + cw / 2, y: sy(Math.max(-480, avg - 60)) });
            }

            ctx.strokeStyle = '#0066cc';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(upperPts[0].x, upperPts[0].y);
            for (var i = 1; i < upperPts.length; i++) ctx.lineTo(upperPts[i].x, upperPts[i].y);
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(lowerPts[0].x, lowerPts[0].y);
            for (var i = 1; i < lowerPts.length; i++) ctx.lineTo(lowerPts[i].x, lowerPts[i].y);
            ctx.stroke();

            ctx.strokeStyle = '#3366ff';
            ctx.lineWidth = 0.5;
            ctx.beginPath();
            ctx.moveTo(midPts[0].x, midPts[0].y);
            for (var i = 1; i < midPts.length; i++) ctx.lineTo(midPts[i].x, midPts[i].y);
            ctx.stroke();

            var hitLines = [];
            for (var i = 0; i < cnt; i++) {
                var x = sx(i);
                var v = values[i];
                var isHit = hitResults[i] === 1;
                var color = isHit ? '#ff0000' : '#00cc00';

                ctx.strokeStyle = '#00ffff';
                ctx.lineWidth = 0.5;
                ctx.beginPath();
                ctx.moveTo(x + cw / 2, sy(v.h));
                ctx.lineTo(x + cw / 2, sy(v.l));
                ctx.stroke();

                var bodyTop = sy(Math.max(v.o, v.c));
                var bodyBottom = sy(Math.min(v.o, v.c));
                var bodyH = Math.abs(bodyBottom - bodyTop);
                if (bodyH < 1) bodyH = 1;
                ctx.fillStyle = color;
                ctx.fillRect(x, bodyTop, cw, bodyH);

                if (isHit) {
                    hitLines.push({ x: x + cw / 2, y: sy((v.h + v.l) / 2) });
                }
            }

            ctx.strokeStyle = '#ff0000';
            ctx.lineWidth = 0.5;
            ctx.setLineDash([3, 3]);
            for (var i = 1; i < hitLines.length; i++) {
                ctx.beginPath();
                ctx.moveTo(hitLines[i-1].x, hitLines[i-1].y);
                ctx.lineTo(hitLines[i].x, hitLines[i].y);
                ctx.stroke();
            }
            ctx.setLineDash([]);

            ctx.fillStyle = '#666666';
            ctx.font = (isBig ? '10px' : '8px') + ' sans-serif';
            ctx.textAlign = 'right';
            for (var i = 0; i <= gridLines; i++) {
                var y = pad.top + ch * i / gridLines;
                var val = Math.round((gridLines / 2 - i) * 50);
                ctx.fillText(val, w - 5, y + 3);
            }

            ctx.textAlign = 'center';
            var step = isBig ? Math.ceil(cnt / 15) : Math.ceil(cnt / 8);
            for (var i = 0; i < cnt; i += step) {
                var x = sx(i) + cw / 2;
                var dataItem = drawData[startIdx + i];
                var issueText = dataItem && dataItem.issue ? dataItem.issue.substring(4) : '';
                ctx.fillText(issueText, x, h - 6);
            }

            if (isBig) {
                ctx.fillStyle = '#888888';
                ctx.font = '9px Microsoft YaHei, sans-serif';
                ctx.textAlign = 'left';
                ctx.fillText('Upper', 5, pad.top + 10);
                ctx.fillStyle = '#0066cc';
                ctx.fillRect(28, pad.top + 6, 10, 1);
                ctx.fillStyle = '#888888';
                ctx.fillText('Mid', 43, pad.top + 10);
                ctx.fillStyle = '#3366ff';
                ctx.fillRect(68, pad.top + 6, 10, 1);
                ctx.fillStyle = '#888888';
                ctx.fillText('Lower', 83, pad.top + 10);
                ctx.fillStyle = '#0066cc';
                ctx.fillRect(108, pad.top + 6, 10, 1);
            }
        }

        function calcMACD(values) {
            var ema12 = [], ema26 = [], macd = [], signal = [], hist = [];
            var k12 = 2 / 13, k26 = 2 / 27, k9 = 2 / 10;
            
            for (var i = 0; i < values.length; i++) {
                var close = values[i].c;
                ema12.push(i === 0 ? close : ema12[i-1] * (1 - k12) + close * k12);
                ema26.push(i === 0 ? close : ema26[i-1] * (1 - k26) + close * k26);
                macd.push(ema12[i] - ema26[i]);
                signal.push(i === 0 ? macd[i] : signal[i-1] * (1 - k9) + macd[i] * k9);
                hist.push(macd[i] - signal[i]);
            }
            return { macd: macd, signal: signal, hist: hist };
        }

        function drawMainChart(canvas, group, chartIdx) {
            var ctx = canvas.getContext('2d');
            var w = canvas.width;
            var h = canvas.height;
            
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, w, h);

            var cnt = Math.min(drawData.length, 80);
            if (cnt === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '14px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('暂无数据', w/2, h/2);
                return;
            }

            var cw = (w - 80) / cnt * 0.75;
            var gap = (w - 80) / cnt - cw;
            var pad = { top: 25, right: 60, bottom: 35, left: 60 };
            var ch = h - pad.top - pad.bottom;

            var set = {};
            for (var i = 0; i < group.length; i++) set[group[i]] = true;
            var hitResults = [];
            for (var i = 0; i < cnt; i++) {
                hitResults.push(set[getPosNum(drawData[i].num)] ? 1 : 0);
            }

            ctx.strokeStyle = '#21262d';
            ctx.lineWidth = 1;
            var gridLines = 8;
            for (var i = 0; i <= gridLines; i++) {
                var y = pad.top + ch * i / gridLines;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
            }
            for (var i = 0; i <= 5; i++) {
                var x = pad.left + (w - pad.left - pad.right) * i / 5;
                ctx.beginPath();
                ctx.moveTo(x, pad.top);
                ctx.lineTo(x, h - pad.bottom);
                ctx.stroke();
            }

            var seed = Date.now() + chartIdx * 10000;
            var last = 50;
            var values = [];
            for (var i = 0; i < cnt; i++) {
                var bonus = hitResults[i] ? 15 : -10;
                var r = rand(seed + i * 100 + chartIdx * 500);
                var close = Math.min(95, Math.max(5, last + bonus + (r - 0.5) * 10));
                var high = Math.min(100, close + rand(seed + i * 100 + 1) * 6);
                var low = Math.max(0, close - rand(seed + i * 100 + 2) * 6);
                var open = i === 0 ? close : last;
                values.push({ o: open, c: close, h: high, l: low });
                last = close;
            }

            var sy = function(val) { return pad.top + ch * (1 - val / 100); };
            var sx = function(i) { return pad.left + i * (cw + gap); };
            
            for (var i = 0; i < cnt; i++) {
                var x = sx(i);
                var v = values[i];
                var color = v.c >= v.o ? '#3fb950' : '#f85149';

                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(x + cw / 2, sy(v.h));
                ctx.lineTo(x + cw / 2, sy(v.l));
                ctx.stroke();

                var bodyTop = sy(Math.max(v.o, v.c));
                var bodyH = Math.abs(sy(v.c) - sy(v.o));
                if (bodyH < 3) bodyH = 3;
                ctx.fillStyle = color;
                ctx.fillRect(x, bodyTop, cw, bodyH);
            }

            var ma5Sum = 0, ma10Sum = 0, ma20Sum = 0;
            var ma5Pts = [], ma10Pts = [], ma20Pts = [];
            for (var i = 0; i < cnt; i++) {
                ma5Sum += values[i].c;
                ma10Sum += values[i].c;
                ma20Sum += values[i].c;
                if (i >= 4) ma5Pts.push({ x: sx(i) + cw / 2, y: sy(ma5Sum / 5) });
                if (i >= 9) ma10Pts.push({ x: sx(i) + cw / 2, y: sy(ma10Sum / 10) });
                if (i >= 19) ma20Pts.push({ x: sx(i) + cw / 2, y: sy(ma20Sum / 20) });
                if (i >= 5) ma5Sum -= values[i - 5].c;
                if (i >= 10) ma10Sum -= values[i - 10].c;
                if (i >= 20) ma20Sum -= values[i - 20].c;
            }

            if (ma5Pts.length > 0) {
                ctx.strokeStyle = '#58a6ff';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(ma5Pts[0].x, ma5Pts[0].y);
                for (var i = 1; i < ma5Pts.length; i++) ctx.lineTo(ma5Pts[i].x, ma5Pts[i].y);
                ctx.stroke();
            }

            if (ma10Pts.length > 0) {
                ctx.strokeStyle = '#f0883e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(ma10Pts[0].x, ma10Pts[0].y);
                for (var i = 1; i < ma10Pts.length; i++) ctx.lineTo(ma10Pts[i].x, ma10Pts[i].y);
                ctx.stroke();
            }

            if (ma20Pts.length > 0) {
                ctx.strokeStyle = '#a371f7';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(ma20Pts[0].x, ma20Pts[0].y);
                for (var i = 1; i < ma20Pts.length; i++) ctx.lineTo(ma20Pts[i].x, ma20Pts[i].y);
                ctx.stroke();
            }

            ctx.fillStyle = '#8b949e';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'right';
            for (var i = 0; i <= gridLines; i++) {
                var y = pad.top + ch * i / gridLines;
                ctx.fillText(Math.round(100 - i * 100 / gridLines), w - 8, y + 4);
            }

            ctx.textAlign = 'center';
            var step = Math.ceil(cnt / 10);
            for (var i = 0; i < cnt; i += step) {
                var x = sx(i) + cw / 2;
                ctx.fillText(drawData[i].issue.substring(4), x, h - 10);
            }

            ctx.fillStyle = '#c9d1d9';
            ctx.font = '11px sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText('MA5', 8, pad.top + 15);
            ctx.fillStyle = '#58a6ff';
            ctx.fillRect(35, pad.top + 10, 20, 2);
            ctx.fillStyle = '#c9d1d9';
            ctx.fillText('MA10', 58, pad.top + 15);
            ctx.fillStyle = '#f0883e';
            ctx.fillRect(95, pad.top + 10, 20, 2);
            ctx.fillStyle = '#c9d1d9';
            ctx.fillText('MA20', 118, pad.top + 15);
            ctx.fillStyle = '#a371f7';
            ctx.fillRect(155, pad.top + 10, 20, 2);

            return values;
        }

        function drawMACDChart(canvas, values) {
            var ctx = canvas.getContext('2d');
            var w = canvas.width;
            var h = canvas.height;
            
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, w, h);

            var cnt = values.length;
            if (cnt === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('暂无数据', w/2, h/2);
                return;
            }

            var cw = (w - 80) / cnt * 0.75;
            var gap = (w - 80) / cnt - cw;
            var pad = { top: 15, right: 60, bottom: 25, left: 60 };
            var ch = h - pad.top - pad.bottom;

            var macd = calcMACD(values);
            var maxVal = Math.max(...macd.macd, ...macd.signal, ...macd.hist.map(x => Math.abs(x))) * 1.2;
            if (maxVal < 0.1) maxVal = 1;

            ctx.strokeStyle = '#21262d';
            ctx.lineWidth = 1;
            var gridLines = 6;
            for (var i = 0; i <= gridLines; i++) {
                var y = pad.top + ch * i / gridLines;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
            }

            var sy = function(val) { return pad.top + ch / 2 - val / maxVal * (ch / 2); };
            var sx = function(i) { return pad.left + i * (cw + gap); };

            ctx.strokeStyle = '#58a6ff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(sx(0) + cw / 2, sy(macd.macd[0]));
            for (var i = 1; i < cnt; i++) ctx.lineTo(sx(i) + cw / 2, sy(macd.macd[i]));
            ctx.stroke();

            ctx.strokeStyle = '#f0883e';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(sx(0) + cw / 2, sy(macd.signal[0]));
            for (var i = 1; i < cnt; i++) ctx.lineTo(sx(i) + cw / 2, sy(macd.signal[i]));
            ctx.stroke();

            for (var i = 0; i < cnt; i++) {
                var x = sx(i);
                var hVal = macd.hist[i];
                var color = hVal >= 0 ? '#3fb950' : '#f85149';
                ctx.fillStyle = color;
                var barH = Math.abs(hVal / maxVal * (ch / 2));
                if (barH < 1) barH = 1;
                ctx.fillRect(x, hVal >= 0 ? sy(hVal) : sy(0), cw, barH);
            }

            ctx.fillStyle = '#8b949e';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'right';
            for (var i = 0; i <= gridLines; i++) {
                var y = pad.top + ch * i / gridLines;
                var val = ((gridLines / 2 - i) / (gridLines / 2) * maxVal).toFixed(2);
                ctx.fillText(val, w - 8, y + 3);
            }
        }

        function drawRSIChart(canvas, values) {
            var ctx = canvas.getContext('2d');
            var w = canvas.width;
            var h = canvas.height;
            
            ctx.fillStyle = '#0d1117';
            ctx.fillRect(0, 0, w, h);

            var cnt = values.length;
            if (cnt === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('暂无数据', w/2, h/2);
                return;
            }

            var cw = (w - 80) / cnt * 0.75;
            var gap = (w - 80) / cnt - cw;
            var pad = { top: 15, right: 60, bottom: 25, left: 60 };
            var ch = h - pad.top - pad.bottom;

            var gains = [], losses = [];
            for (var i = 1; i < cnt; i++) {
                var diff = values[i].c - values[i-1].c;
                gains.push(Math.max(0, diff));
                losses.push(Math.max(0, -diff));
            }

            var avgGain = [], avgLoss = [], rs = [], rsi = [];
            var period = 14;
            for (var i = 0; i < gains.length; i++) {
                if (i < period - 1) {
                    avgGain.push(gains.slice(0, i+1).reduce((a,b) => a+b, 0) / (i+1));
                    avgLoss.push(losses.slice(0, i+1).reduce((a,b) => a+b, 0) / (i+1));
                } else {
                    avgGain.push((avgGain[i-1] * (period-1) + gains[i]) / period);
                    avgLoss.push((avgLoss[i-1] * (period-1) + losses[i]) / period);
                }
                rs.push(avgLoss[i] > 0 ? avgGain[i] / avgLoss[i] : 100);
                rsi.push(100 - 100 / (1 + rs[i]));
            }

            ctx.strokeStyle = '#21262d';
            ctx.lineWidth = 1;
            var gridLines = 5;
            for (var i = 0; i <= gridLines; i++) {
                var y = pad.top + ch * i / gridLines;
                ctx.beginPath();
                ctx.moveTo(pad.left, y);
                ctx.lineTo(w - pad.right, y);
                ctx.stroke();
            }

            ctx.fillStyle = 'rgba(248, 81, 73, 0.2)';
            var overboughtY = pad.top + ch * 0.2;
            ctx.fillRect(pad.left, pad.top, w - pad.left - pad.right, overboughtY - pad.top);

            ctx.fillStyle = 'rgba(63, 185, 80, 0.2)';
            var oversoldY = pad.top + ch * 0.8;
            ctx.fillRect(pad.left, oversoldY, w - pad.left - pad.right, h - pad.bottom - oversoldY);

            ctx.strokeStyle = '#f85149';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(pad.left, overboughtY);
            ctx.lineTo(w - pad.right, overboughtY);
            ctx.stroke();

            ctx.strokeStyle = '#3fb950';
            ctx.beginPath();
            ctx.moveTo(pad.left, oversoldY);
            ctx.lineTo(w - pad.right, oversoldY);
            ctx.stroke();

            var sy = function(val) { return pad.top + ch * (1 - val / 100); };
            var sx = function(i) { return pad.left + (i + 1) * (cw + gap); };

            ctx.strokeStyle = '#c9d1d9';
            ctx.lineWidth = 2;
            if (rsi.length > 0) {
                ctx.beginPath();
                ctx.moveTo(sx(0) + cw / 2, sy(rsi[0]));
                for (var i = 1; i < rsi.length; i++) ctx.lineTo(sx(i) + cw / 2, sy(rsi[i]));
                ctx.stroke();
            }

            ctx.fillStyle = '#8b949e';
            ctx.font = '10px sans-serif';
            ctx.textAlign = 'right';
            for (var i = 0; i <= gridLines; i++) {
                var y = pad.top + ch * i / gridLines;
                ctx.fillText(Math.round(100 - i * 100 / gridLines), w - 8, y + 3);
            }
        }

        function showGroups() {
            var list = document.getElementById('groupsList');
            if (groups.length === 0) {
                list.innerHTML = '点击按钮生成分组';
                return;
            }

            var html = '';
            for (var i = 0; i < groups.length; i++) {
                var h = calcHit(groups[i], drawData);
                var nums = [];
                for (var j = 0; j < Math.min(30, groups[i].length); j++) {
                    nums.push(fmtNum(groups[i][j]));
                }
                html += '<div class="group-item">' +
                    '<div class="group-header">' +
                    '<span class="group-name">第' + (i+1) + '组</span>' +
                    '<span class="group-info">' + groups[i].length + '个 | 命中' + h.hits + '/' + h.total + '</span>' +
                    '</div>' +
                    '<button class="copy-btn" onclick="copyGroup(' + i + ')">复制</button>' +
                    '<div class="group-nums">' + nums.join(' ') + (groups[i].length > 30 ? '...' : '') + '</div>' +
                    '</div>';
            }
            list.innerHTML = html;
        }

        function copyGroup(idx) {
            var nums = [];
            for (var i = 0; i < groups[idx].length; i++) {
                nums.push(groups[idx][i]);
            }
            nums.sort(function(a, b) { return a - b; });
            var formatted = nums.map(function(n) { return fmtNum(n); });
            var result = '';
            for (var i = 0; i < formatted.length; i += 10) {
                result += formatted.slice(i, i + 10).join(' ') + '\n';
            }
            navigator.clipboard.writeText(result.trim()).then(function() {
                alert('已复制第' + (idx+1) + '组，共' + nums.length + '个号码');
            });
        }

        function generateGroups(n) {
            console.log('========================================');
            console.log('generateGroups called with n=' + n);
            
            currentN = n; // 保存当前的分组数量
            
            var btns = document.getElementsByClassName('golden-btn');
            for (var i = 0; i < btns.length; i++) {
                btns[i].classList.remove('active');
            }
            event.target.classList.add('active');

            var base = document.getElementById('baseInput').value.trim();
            var baseNums = null;
            if (base) {
                baseNums = parseBase(base);
                console.log('Using base numbers: ' + baseNums.length + ' numbers');
                if (baseNums.length < n) {
                    alert('大底至少需要' + n + '个号码');
                    return;
                }
            }

            groups = createGroups(n, baseNums);
            console.log('Groups created: ' + groups.length + ' groups');
            console.log('Group sizes:', groups.map(function(g) { return g.length; }));
            
            showGroups();
            updateCharts(n);

            var posName = posType === 'front' ? '前三' : (posType === 'middle' ? '中三' : '后三');
            document.getElementById('status').textContent = 
                '已生成' + n + '组 | 每组约' + Math.round(groups[0].length) + '个号码 | 定位: ' + posName;
        }

        function loadDraws() {
            var input = document.getElementById('drawInput').value.trim();
            if (!input) {

        function importData() {
            var input = document.createElement('input');
            input.type = 'file';
            input.accept = '.json';
            input.onchange = function(e) {
                var file = e.target.files[0];
                if (!file) return;
                
                var reader = new FileReader();
                reader.onload = function(event) {
                    try {
                        var importedData = JSON.parse(event.target.result);
                        if (!Array.isArray(importedData)) {
                            alert('无效的数据格式！');
                            return;
                        }
                        
                        // 合并数据
                        var existingPeriods = {};
                        for (var i = 0; i < drawData.length; i++) {
                            existingPeriods[drawData[i].period] = true;
                        }
                        
                        var addedCount = 0;
                        for (var j = 0; j < importedData.length; j++) {
                            var item = importedData[j];
                            if (item && item.period && item.num && !existingPeriods[item.period]) {
                                drawData.push(item);
                                addedCount++;
                            }
                        }
                        
                        // 按日期和期数排序（最新的在前）
                        drawData.sort(function(a, b) {
                            // 期号格式：20260620-0037
                            var partsA = a.period.split('-');
                            var partsB = b.period.split('-');
                            
                            // 先按日期排序
                            if (partsA[0] !== partsB[0]) {
                                return partsB[0].localeCompare(partsA[0]);
                            }
                            
                            // 日期相同则按期数排序
                            var numA = partsA.length > 1 ? parseInt(partsA[1]) : 0;
                            var numB = partsB.length > 1 ? parseInt(partsB[1]) : 0;
                            return numB - numA;
                        });
                        
                        if (drawData.length > 500) {
                            drawData = drawData.slice(0, 500);
                        }
                        
                        saveToLocalStorage();
                        document.getElementById('drawInput').value = formatDrawData(drawData);
                        document.getElementById('drawCount').textContent = drawData.length + '期';
                        loadDraws();
                        
                        var statusEl = document.getElementById('apiStatus');
                        if (statusEl) {
                            statusEl.textContent = '成功导入 ' + addedCount + ' 条数据！';
                            statusEl.style.color = '#238636';
                            setTimeout(function() { statusEl.textContent = ''; }, 3000);
                        }
                    } catch (e) {
                        alert('数据解析失败: ' + e.message);
                    }
                };
                reader.readAsText(file);
            };
            input.click();
        }

        function initEditor() {
            var canvas = document.getElementById('editorCanvas');
            canvas.addEventListener('mousedown', function(e) {
                isDrawing = true;
                editorData = [];
                drawEditorLine(e);
            });
            canvas.addEventListener('mousemove', function(e) {
                if (isDrawing) drawEditorLine(e);
            });
            canvas.addEventListener('mouseup', function() {

            });

            });

        function drawEditorLine(e) {
            var canvas = document.getElementById('editorCanvas');
            var rect = canvas.getBoundingClientRect();
            var y = e.clientY - rect.top;
            var h = canvas.height;
            
            // 计算是0还是1（上方0，下方1）
            var val = y < h / 2 ? 0 : 1;
            editorData.push(val);
            
            // 限制数据长度
            if (editorData.length > 100) editorData.shift();
            
            drawEditorPreview();
        }

        function drawEditorPreview(data) {
            var canvas = document.getElementById('editorCanvas');
            var ctx = canvas.getContext('2d');
            var w = canvas.width;
            var h = canvas.height;
            
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, w, h);
            
            var d = data || editorData;
            if (d.length === 0) {
                ctx.fillStyle = '#666';
                ctx.font = '12px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('点击上方区域绘制趋势图', w/2, h/2);
                ctx.font = '10px sans-serif';
                ctx.fillText('上方=命中(0) 下方=未中(1)', w/2, h/2 + 20);
                return;
            }
            
            // 绘制网格
            ctx.strokeStyle = '#1a1a1a';
            ctx.lineWidth = 0.5;
            for (var i = 0; i <= 10; i++) {
                var y = h * i / 10;
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(w, y);
                ctx.stroke();
            }
            
            // 绘制数据线
            var cw = w / d.length;
            ctx.strokeStyle = '#3366ff';
            ctx.lineWidth = 1;
            ctx.beginPath();
            
            var midY = h / 2;
            for (var i = 0; i < d.length; i++) {
                var x = i * cw + cw / 2;
                var y = d[i] === 0 ? midY - 20 : midY + 20;
                if (i === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            }
            ctx.stroke();
            
            // 绘制点
            ctx.fillStyle = '#ff0000';
            for (var i = 0; i < d.length; i++) {
                var x = i * cw + cw / 2;
                var y = d[i] === 0 ? midY - 20 : midY + 20;
                ctx.beginPath();
                ctx.arc(x, y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // ==================== 相似度匹配算法 ====================
        function calcHitResults(numbers, drawData, posType) {
            var result = [];
            for (var i = 0; i < drawData.length; i++) {
                var num = drawData[i].num;
                var target;
                if (posType === 'front') target = parseInt(num.substring(0, 3), 10);
                else if (posType === 'middle') target = parseInt(num.substring(1, 4), 10);
                else target = parseInt(num.substring(2, 5), 10);
                
                result.push(numbers.indexOf(target) >= 0 ? 1 : 0);
            }
            return result;
        }

        function calcPatternScore(patternData, hitResults) {
            if (patternData.length === 0 || hitResults.length === 0) return 0;
            
            // 使用滑动窗口对比
            var patternLen = patternData.length;
            var dataLen = hitResults.length;
            
            // 标准化：把patternData转为-1和1
            var normalized = [];
            for (var i = 0; i < patternLen; i++) {
                normalized.push(patternData[i] === 0 ? 1 : -1);
            }
            
            // 尝试不同的滑动位置
            var bestScore = 0;
            var startIdx = Math.max(0, dataLen - patternLen * 3);
            var endIdx = dataLen;
            
            for (var offset = startIdx; offset < endIdx - patternLen + 1; offset++) {
                var score = 0;
                for (var i = 0; i < patternLen; i++) {
                    var hitVal = hitResults[offset + i] === 1 ? 1 : -1;
                    if (hitVal === normalized[i]) score++;
                    else score--;
                }
                
                // 归一化到0-100
                var normalizedScore = (score / patternLen + 1) * 50;
                bestScore = Math.max(bestScore, normalizedScore);
            }
            
            return bestScore;
        }

        function findBestMatchingGroup(groups, patternData, drawData, posType) {
            var bestIdx = -1;
            var bestScore = -1;
            
            for (var i = 0; i < groups.length; i++) {
                var hitResults = calcHitResults(groups[i], drawData, posType);
                var score = calcPatternScore(patternData, hitResults);
                
                if (score > bestScore) {
                    bestScore = score;
                    bestIdx = i;
                }
            }
            
            return { idx: bestIdx, score: bestScore };
        }

        // ==================== 自动分割流程 ====================
        function startAutoSplit() {
            var count = parseInt(document.getElementById('splitCount').value);
            var splitResults = [];
            var currentNumbers = null; // 当前分割的号码集
            
            // 验证配置
            for (var i = 1; i <= count; i++) {
                var trendIdx = parseInt(document.getElementById('splitTrend' + i).value);
                if (isNaN(trendIdx) || trendIdx < 0) {
                    alert('第' + i + '次分割必须选择一个趋势图');
                    return;
                }
            }
            
            closeSplitModal();
            
            // 开始分割流程
            for (var i = 1; i <= count; i++) {
                var n = parseInt(document.getElementById('splitType' + i).value);
                var trendIdx = parseInt(document.getElementById('splitTrend' + i).value);
                var pattern = trendPatterns[trendIdx];
                
                // 生成分组
                var grps;
                if (currentNumbers === null) {
                    grps = createGroups(n, null);
                } else {
                    grps = createGroups(n, currentNumbers);
                }
                
                // 找出最匹配的分组
                var best = findBestMatchingGroup(grps, pattern.data, drawData, posType);
                
                // 保存结果
                splitResults.push({
                    round: i,
                    type: n + '中' + (n - 1),
                    trendName: pattern.name,
                    score: best.score,
                    group: grps[best.idx]
                });
                
                // 提取号码作为下一轮的输入
                currentNumbers = grps[best.idx];
            }
            
            // 显示最终结果
            displayAutoResult(splitResults);
        }

        function copyToClipboard(text, count) {
            var statusEl = document.getElementById('copyStatus');

            var targetTextarea;
            
            if (existingTextarea) {

                if (successful) {
                    if (statusEl) {

        // ==================== 外部数据接入 ====================
        function fetchExternalData() {
            var url = document.getElementById('apiUrl').value.trim();
            var statusEl = document.getElementById('apiStatus');
            
            if (!url) {
                if (statusEl) {
                    statusEl.textContent = '请输入API地址';
                    statusEl.style.color = '#f85149';
                }
                return;
            }
            
            if (statusEl) {
                statusEl.textContent = '正在获取数据...';
                statusEl.style.color = '#58a6ff';
            }
            
            var proxyUrl = 'http://localhost:8888/?url=' + encodeURIComponent(url);
            
            fetch(proxyUrl, {
                method: 'GET'
            })
                .then(function(response) {
                    if (!response.ok) {
                        throw new Error('网络请求失败: ' + response.status);
                    }
                    return response.text();
                })
                .then(function(text) {
                    try {
                        console.log('API原始数据:', text);
                        var data;
                        if (url.toLowerCase().endsWith('.xml')) {
                            data = parseXML(text);
                        } else {
                            data = JSON.parse(text);
                        }
                        console.log('解析后数据:', data);
                        parseAndLoadExternalData(data);
                        updateCurrentDrawDisplay(); // 更新当期开奖号码显示
                        if (statusEl) {
                            statusEl.textContent = '数据获取成功！';
                            statusEl.style.color = '#238636';
                        }
                        setTimeout(function() {
                            if (statusEl) statusEl.textContent = '';
                        }, 3000);
                    } catch (e) {
                        console.error('数据解析失败:', e);
                        throw new Error('数据解析失败: ' + e.message);
                    }
                })
                .catch(function(error) {
                    console.error('获取数据失败:', error);
                    if (statusEl) {
                        statusEl.textContent = '获取失败: ' + error.message;
                        statusEl.style.color = '#f85149';
                    }
                    // 如果获取失败，保持现有数据不变
                    if (drawData.length > 0) {
                        document.getElementById('drawInput').value = formatDrawData(drawData);
                        document.getElementById('drawCount').textContent = drawData.length + '期';
                        
                        var dataStatusEl = document.getElementById('dataStatus');
                        if (dataStatusEl) {
                            dataStatusEl.textContent = '本地存储: ' + drawData.length + '期 | 最大: 500期';
                        }
                    }
                });
        }

        function parseXML(xmlText) {
            var parser = new DOMParser();
            var xmlDoc = parser.parseFromString(xmlText, 'text/xml');
            
            var items = xmlDoc.getElementsByTagName('row');
            var results = [];
            
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var result = {};
                
                for (var j = 0; j < item.attributes.length; j++) {
                    var attr = item.attributes[j];
                    result[attr.name] = attr.value;
                }
                
                results.push(result);
            }
            
            return results;
        }

        function parseAndLoadExternalData(data) {
            var results = [];
            
            // 尝试多种常见数据格式
            if (data.result) data = data.result;
            if (data.data) data = data.data;
            if (Array.isArray(data.list)) data = data.list;
            
            // 支持对象格式（如 {"HN300": [...]}）
            if (!Array.isArray(data)) {
                for (var key in data) {
                    if (Array.isArray(data[key])) {
                        data = data[key];
                        break;
                    }
                }
            }
            
            if (Array.isArray(data)) {
                for (var i = 0; i < data.length; i++) {
                    var item = data[i];
                    var period = '';
                    var num = '';
                    
                    // 尝试多种字段名
                    if (item.period) period = item.period.toString();
                    else if (item.qihao) period = item.qihao.toString();
                    else if (item.no) period = item.no.toString();
                    else if (item.id) period = item.id.toString();
                    else if (item.QiHao) period = item.QiHao.toString();
                    else if (item.Issue) period = item.Issue.toString();
                    else if (item.issue) period = item.issue.toString();
                    
                    if (item.num) num = item.num.toString();
                    else if (item.number) num = item.number.toString();
                    else if (item.result) num = item.result.toString();
                    else if (item.winNumber) num = item.winNumber.toString();
                    else if (item.Number) num = item.Number.toString();
                    else if (item.code) num = item.code.toString();
                    else if (item.Ball) num = item.Ball.toString();
                    else if (item.balls) num = item.balls.toString().replace(/[,\s]/g, '');
                    
                    if (period && num) {
                        // 清理号码格式（去除空格、逗号等）
                        num = num.replace(/[,\s，。、]/g, '');
                        if (num.length >= 5) {
                            // 处理期号格式
                            // 支持格式：20260620-0007, 202606200007, 0620-0007, 06200007等
                            period = period.trim();
                            
                            // 统一期号格式为：YYYYMMDD-NNNN
                            var periodMatch = period.match(/(\d{8})[-_]?(\d{2,4})/);
                            if (periodMatch) {
                                period = periodMatch[1] + '-' + periodMatch[2].padStart(4, '0');
                            } else if (period.length === 12) {
                                period = period.substring(0, 8) + '-' + period.substring(8);
                            } else if (period.length === 11) {
                                period = period.substring(0, 8) + '-' + period.substring(8).padStart(4, '0');
                            } else if (period.length <= 8 && !period.includes('-')) {
                                var year = new Date().getFullYear().toString();
                                period = year.substring(0, 2) + period;
                            }
                            
                            results.push({
                                period: period,
                                num: num.substring(0, 5)
                            });
                        }
                    }
                }
            }
            
            if (results.length > 0) {
                console.log('API返回 ' + results.length + ' 条数据');
                console.log('合并前本地已有 ' + drawData.length + ' 条数据');
                
                // 限制最多300期（API获取的新数据）
                var maxCount = 300;
                if (results.length > maxCount) {
                    results = results.slice(0, maxCount);
                }
                
                // 增量更新：合并新数据和现有数据，去重
                var existingPeriods = {};
                for (var i = 0; i < drawData.length; i++) {
                    existingPeriods[drawData[i].period] = true;
                }
                
                console.log('本地已有的期号:', Object.keys(existingPeriods));
                
                // 添加新数据（只添加不存在的期号）
                var newCount = 0;
                for (var j = 0; j < results.length; j++) {
                    if (!existingPeriods[results[j].period]) {
                        drawData.push(results[j]);
                        newCount++;
                    }
                }
                console.log('本次刷新新增 ' + newCount + ' 条数据，当前总计 ' + drawData.length + ' 条');
                
                if (newCount > 0) {
                    var statusEl = document.getElementById('apiStatus');
                    if (statusEl) {
                        statusEl.textContent = '🎉 新增 ' + newCount + ' 期数据！当前总计: ' + drawData.length + '期';
                        statusEl.style.color = '#238636';
                    }
                }
                
                if (newCount === 0 && results.length > 0) {
                    console.log('没有新增数据，API返回的期号：', results.map(function(item) { return item.period; }));
                    console.log('本地已有的期号：', drawData.map(function(item) { return item.period; }));
                }
                
                // 过滤无效数据
                drawData = drawData.filter(function(item) {
                    return item && item.period && item.num;
                });
                
                // 按期号排序（最新的在前）
                drawData.sort(function(a, b) {
                    return b.period.localeCompare(a.period);
                });
                
                // 限制最多500期
                if (drawData.length > 500) {
                    drawData = drawData.slice(0, 500);
                }
                
                // 保存到本地存储
                saveToLocalStorage();
                
                document.getElementById('drawInput').value = formatDrawData(drawData);
                document.getElementById('drawCount').textContent = drawData.length + '期';
                
                var dataStatusEl = document.getElementById('dataStatus');
                if (dataStatusEl) {
                    dataStatusEl.textContent = '本地存储: ' + drawData.length + '期 | 最大: 500期';
                }
                
                var posName = posType === 'front' ? '前三' : (posType === 'middle' ? '中三' : '后三');
                document.getElementById('status').textContent = 
                    '已导入' + drawData.length + '期开奖数据 | 定位: ' + posName;
                
                console.log('fetchExternalData完成，调用refreshChartsIfNeeded...');
                refreshChartsIfNeeded();
            }
        }

                textarea.style.left = '-9999px';
                document.body.appendChild(textarea);
                textarea.focus();
                document.execCommand('paste');
                var text = textarea.value;
                document.body.removeChild(textarea);
                
                if (!text || text.trim() === '') {
                    alert('剪贴板为空！请先复制网页上的开奖数据');
                    return;
                }
                
                var parsed = parseWebData(text);
                
                if (parsed.length === 0) {
                    alert('未解析到有效数据！');
                    return;
                }
                
                for (var i = 0; i < parsed.length; i++) {
                    var item = parsed[i];
                    var exists = drawData.find(function(d) { return d.period === item.period; });
                    if (!exists) {
                        drawData.push(item);
                    }
                }
                
                drawData.sort(function(a, b) { return b.period.localeCompare(a.period); });
                
                if (drawData.length > 500) {
                    drawData = drawData.slice(0, 500);
                }
                
                saveDrawData();
                document.getElementById('drawInput').value = formatDrawData(drawData);
                document.getElementById('drawCount').textContent = drawData.length + '期';
                
                var dataStatusEl = document.getElementById('dataStatus');
                if (dataStatusEl) {
                    dataStatusEl.textContent = '本地存储: ' + drawData.length + '期 | 最大: 500期';
                }
                
                loadDraws();
                
                alert('成功导入 ' + parsed.length + ' 条数据！');
            });
        }

        function parseWebData(text) {
            var result = [];
            var lines = text.trim().split('\n');
            
            var currentPeriod = null;
            var numberBuffer = [];
            
            for (var i = 0; i < lines.length; i++) {
                var line = lines[i].trim();
                if (!line) continue;
                
                if (line.indexOf('期号') !== -1 || line.indexOf('开奖') !== -1 || line.indexOf('河内') !== -1 || 
                    line.indexOf('形态') !== -1 || line.indexOf('和值') !== -1 || line.indexOf('组三') !== -1 ||
                    line.indexOf('百位') !== -1 || line.indexOf('十位') !== -1 || line.indexOf('个位') !== -1 ||
                    line.indexOf('号码分布') !== -1) {
                    if (currentPeriod && numberBuffer.length >= 5) {
                        var num = numberBuffer.slice(0, 5).join('');
                        result.push({ period: currentPeriod, num: num });
                    }
                    currentPeriod = null;
                    numberBuffer = [];
                    continue;
                }
                
                var periodMatch = line.match(/(\d{8})[-_]?(\d{2,4})/);
                if (!periodMatch) {
                    periodMatch = line.match(/(\d{10,12})/);
                }
                
                if (periodMatch) {
                    if (currentPeriod && numberBuffer.length >= 5) {
                        var num = numberBuffer.slice(0, 5).join('');
                        result.push({ period: currentPeriod, num: num });
                    }
                    
                    var period;
                    if (periodMatch.length === 3) {
                        period = periodMatch[1] + '-' + periodMatch[2].padStart(4, '0');
                    } else {
                        var fullNum = periodMatch[1];
                        period = fullNum.substring(0, 8) + '-' + fullNum.substring(8).padStart(4, '0');
                    }
                    currentPeriod = period;
                    numberBuffer = [];
                    
                    var allDigits = line.replace(periodMatch[0], '').replace(/\D/g, '');
                    if (allDigits.length > 0) {
                        numberBuffer.push(...allDigits.split(''));
                    }
                } else {
                    var singleDigit = line.match(/^\d$/);
                    if (singleDigit) {
                        if (currentPeriod) {
                            numberBuffer.push(singleDigit[0]);
                        }
                    } else {
                        var digits = line.replace(/\D/g, '');
                        if (digits.length > 0 && currentPeriod) {
                            numberBuffer.push(...digits.split(''));
                        }
                    }
                }
            }
            
            if (currentPeriod && numberBuffer.length >= 5) {
                var num = numberBuffer.slice(0, 5).join('');
                result.push({ period: currentPeriod, num: num });
            }
            
            result.sort(function(a, b) { return b.period.localeCompare(a.period); });
            
            var unique = [];
            var seen = {};
            for (var j = 0; j < result.length; j++) {
                if (!seen[result[j].period]) {
                    seen[result[j].period] = true;
                    unique.push(result[j]);
                }
            }
            
            return unique;
        }
    </script>
